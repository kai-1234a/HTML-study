<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <h1>HTMLの基礎を学ぼうaaaa</h1>

    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
    <h2>好きな食べ物</h2>
    <p>寿司が好きです</p>
    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
    <h3>趣味リスト</h3>
    <ul>
      <li>ゲーム</li>
      <li>映画鑑賞</li>
    </ul>
    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
    <h4>リンク</h4>
    <p><a href="https://www.google.com">googleを開く</a></p>
    <h2>画像</h2>
    <img src="https://growthseed.jp/wp-content/uploads/2016/12/peach-1.jpg" />
    <!-- Step 5: <div> でグループ化してみよう -->
    <div>
      <h2>プロフィール</h2>
      <p>田中太郎 / 20歳</p>
      <p>東京都在住</p>
    </div>

    <div>
      <h2>趣味</h2>
      <ul>
        <li>読書</li>
        <li>ゲーム</li>
      </ul>
    </div>
  </body>
</html>
